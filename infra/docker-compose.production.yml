services:
  api:
    env_file:
      - ../.env.production
    ports: []
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      - ENABLE_PI_RUNTIME=1
      - PI_SIDECAR_URL=http://pi-sidecar:8787
      - MEM0_ENABLED=${MEM0_ENABLED:-1}
      - MEM0_CONFIG_JSON=${MEM0_CONFIG_JSON:-}
  pi-sidecar:
    env_file:
      - ../.env.production
    ports: []
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  web:
    env_file:
      - ../.env.production
    ports: []
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  celery-worker:
    env_file:
      - ../.env.production
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  celery-beat:
    env_file:
      - ../.env.production
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  postgres:
    ports: []

  redis:
    ports: []

  minio:
    ports: []

  jaeger:
    ports: []

  prometheus:
    ports: []

  grafana:
    ports: []
