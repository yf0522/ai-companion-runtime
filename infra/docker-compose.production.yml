services:
  api:
    env_file: !override
      - ../.env.production
    ports: !override []
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  web:
    build:
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:?NEXT_PUBLIC_WS_URL is required}
        NEXT_PUBLIC_AGENT_RUNTIME: ${NEXT_PUBLIC_AGENT_RUNTIME:?NEXT_PUBLIC_AGENT_RUNTIME is required}
    env_file:
      - ../.env.production
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:?NEXT_PUBLIC_WS_URL is required}
      NEXT_PUBLIC_AGENT_RUNTIME: ${NEXT_PUBLIC_AGENT_RUNTIME:?NEXT_PUBLIC_AGENT_RUNTIME is required}
    ports: !override []
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  celery-worker:
    env_file: !override
      - ../.env.production
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  celery-beat:
    env_file: !override
      - ../.env.production
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  postgres:
    ports: !override []

  redis:
    ports: !override []

  minio:
    ports: !override []

  jaeger:
    ports: !override []

  prometheus:
    ports: !override []

  grafana:
    ports: !override []
