services:
  api:
    build: ../apps/api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      pi-sidecar:
        condition: service_healthy
    env_file: ../.env
    environment:
      - ENABLE_PI_RUNTIME=1
      - PI_SIDECAR_URL=http://pi-sidecar:8787
      - MEM0_ENABLED=${MEM0_ENABLED:-0}
      - MEM0_CONFIG_JSON=${MEM0_CONFIG_JSON:-}    volumes:
      - ../apps/api/app/config:/app/app/config
    restart: unless-stopped

  pi-sidecar:
    build: ../apps/pi-sidecar
    ports:
      - "8787:8787"
    environment:
      - PI_SIDECAR_HOST=0.0.0.0
      - PI_SIDECAR_PORT=8787
      - PI_ENABLE_TOOLS=1
      - TOOL_BRIDGE_URL=http://api:8000/api
      - TOOL_BRIDGE_TOKEN=${TOOL_BRIDGE_TOKEN:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-${GOOGLE_API_KEY:-}}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-${GEMINI_API_KEY:-}}
      - PI_PROVIDER=${PI_PROVIDER:-google}
      - PI_MODEL=${PI_MODEL:-gemini-flash-latest}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    build: ../apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: unless-stopped

  celery-worker:
    build: ../apps/api
    command: celery -A app.workers.celery_app worker -l info -c 4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    env_file: ../.env
    restart: unless-stopped

  celery-beat:
    build: ../apps/api
    command: celery -A app.workers.celery_app beat -l info
    depends_on:
      - redis
    env_file: ../.env
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    # Bind to localhost only — not exposed to external network
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: companion
      POSTGRES_USER: ${PG_USER:-companion}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-companion_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-companion}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Bind to localhost only
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-companion_redis_secret}
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    # Bind to localhost only
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin_secret}
    volumes:
      - miniodata:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin_secret};
      mc mb local/archive --ignore-existing;
      mc mb local/attachments --ignore-existing;
      mc mb local/traces --ignore-existing;
      echo 'MinIO buckets initialized';
      "

  jaeger:
    image: jaegertracing/all-in-one:1.54
    # Bind to localhost only — internal observability
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    volumes:
      - grafdata:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-change_me_grafana}
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  grafdata:
