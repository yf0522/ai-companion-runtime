models:
  primary:
    provider: "qwen"
    model: "qwen-plus"
    api_key_env: "QWEN_API_KEY"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    max_tokens: 2048
    temperature: 0.8
    stream: true

  fallback:
    provider: "deepseek"
    model: "deepseek-chat"
    api_key_env: "DEEPSEEK_API_KEY"
    base_url: "https://api.deepseek.com/v1"
    max_tokens: 2048
    temperature: 0.8
    stream: true

  fast:
    provider: "qwen"
    model: "qwen-turbo"
    api_key_env: "QWEN_API_KEY"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    max_tokens: 100
    temperature: 0.9
    stream: true

