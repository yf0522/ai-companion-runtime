rules:
  critical:
    category: health_emergency
    keywords:
      - "胸口疼"
      - "胸闷喘不上气"
      - "喘不上气"
      - "摔倒了站不起来"
      - "头晕眼前发黑"
      - "说不出话"
      - "半边身体不能动"
      - "心脏疼"
      - "呼吸困难"
      - "晕倒"
    action: emergency_response
    notify: emergency_contact
    block_tools: true

  high:
    categories:
      scam_alert:
        keywords:
          - "转钱"
          - "汇款"
          - "公安局打电话"
          - "银行卡密码"
          - "中奖"
          - "保证金"
          - "安全账户"
          - "不要告诉别人"
          - "验证码发给我"
          - "冻结你的账户"
        patterns:
          - "(?:让|要|叫).{0,6}(?:转账|汇款|打钱|转钱)"
          - "(?:公安|检察|法院).{0,6}(?:打电话|来电|通知)"
      health_emergency:
        keywords:
          - "这两天一直头疼"
          - "吃不下饭好几天"
          - "晚上老睡不着"
          - "腿肿"
          - "血压特别高"
          - "血糖降不下来"
          - "连着好几天不舒服"
        action: alert_and_notify
        notify: family
      emotional_crisis:
        keywords:
          - "我想死"
          - "想死"
          - "不想活了"
          - "不想活"
          - "自杀"
          - "结束生命"
          - "了结自己"
          - "活不下去"
          - "不如死了"
          - "去死吧我"
        action: alert_and_notify
        notify: family
    action: alert_and_notify
    notify: family
    block_tools: true

  medium:
    category: emotional_low
    keywords:
      - "没人跟我说话"
      - "一个人好无聊"
      - "孩子好久没来了"
      - "老了不中用"
      - "给人添麻烦"
      - "活着没意思"
      - "不想动"
      - "好久没出门了"
      - "没人记得我"
    action: companion_and_notify

# Words that negate risk keywords — if found before a keyword, suppress the match
negation_words:
  - "不想"
  - "不要"
  - "没有"
  - "不是"
  - "不会"
  - "别"
  - "并非"

# Patterns that look risky but are actually benign (false positive suppression)
safe_context_patterns:
  - "死机"
  - "笑死"
  - "死循环"
  - "打死不"
  - "气死了"
  - "累死"
  - "饿死"
  - "无聊死"
  - "去死皮赖脸"
  - "不想死"

safety_hotline:
  text: "如果你正在经历困难，可以拨打全国统一心理援助热线 12356，或希望24小时热线 400-161-9995"

safety_messages:
  critical: "先别动，坐下来慢慢呼吸。我已经通知您的家人了，他们马上会联系您。如果情况紧急，请让身边的人帮忙拨打120。"
  high: "这个听起来可能是骗人的，千万不要转钱或者告诉对方密码！我帮您通知家人确认一下。"
  high_emotional_crisis: "我听到你很痛苦。请马上拨打全国统一心理援助热线 12356，或希望24小时热线 400-161-9995。若有紧急危险，请拨打 110 或 120。我正在通知您的家人。"
  emotional_crisis: "我听到你很痛苦。请马上拨打全国统一心理援助热线 12356，或希望24小时热线 400-161-9995。若有紧急危险，请拨打 110 或 120。我正在通知您的家人。"
  medium: "我听到你了。今天你可能有点低落，我们先慢慢聊。"
