rules:
  critical:
    keywords:
      - "不想活了"
      - "想死"
      - "自杀"
      - "结束生命"
      - "去死"
      - "想si"
      - "自sha"
      - "suicide"
      - "kill myself"
      - "want to die"
    action: fixed_safety_message
    notify: admin
    block_tools: true

  high:
    keywords:
      - "活着没意思"
      - "太痛苦了"
      - "撑不下去"
      - "好想消失"
      - "世界没有我会更好"
      - "不想活"
      - "了结"
    patterns:
      - "(?:想|要|去).{0,4}(?:死|走|消失|解脱)"
      - "(?:活着|人生).{0,6}(?:没意思|没意义|没希望)"
      - "(?:不想|不要).{0,4}(?:活|在这个世界)"
    action: safety_template
    include_hotline: true
    block_tools: true

  medium:
    keywords:
      - "绝望"
      - "无助"
      - "没有希望"
      - "看不到未来"
      - "太痛苦"
      - "活着好累"
      - "人生没意义"
      - "好想哭"
      - "受够了"
    action: add_care_guidance

# Words that negate risk keywords — if found before a keyword, suppress the match
negation_words:
  - "不想"
  - "不要"
  - "没有"
  - "不是"
  - "不会"
  - "别"
  - "并非"

# Patterns that look risky but are actually benign (false positive suppression)
safe_context_patterns:
  - "死胡同"
  - "死机"
  - "死循环"
  - "打死不"
  - "气死了"
  - "笑死"
  - "累死"
  - "饿死"
  - "无聊死"
  - "去死皮赖脸"

safety_hotline:
  text: "如果你正在经历困难，可以拨打 24 小时心理援助热线：400-161-9995"

safety_messages:
  critical: "我注意到你可能正在经历很大的困难。你的感受很重要，请你记住你不是一个人。如果你现在需要帮助，请拨打 24 小时心理援助热线：400-161-9995。"
  high: "我听到你了，你现在的感受一定很不容易。如果你愿意，可以跟我多聊聊。如果你感觉需要专业的支持，24 小时心理援助热线随时可以联系：400-161-9995。"
