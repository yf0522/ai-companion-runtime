name: Production Contracts

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "infra/**"
      - "scripts/**"
      - "docs/runbooks/**"
      - ".github/workflows/production-contracts.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "infra/**"
      - "scripts/**"
      - "docs/runbooks/**"
      - ".github/workflows/production-contracts.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: companion_ci
          POSTGRES_PASSWORD: companion_ci_password
          POSTGRES_DB: companion_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U companion_ci -d companion_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff full lint
        run: ruff check app tests
      - name: Disposable pgvector migration contract
        env:
          MIGRATION_DATABASE_URL: postgresql+asyncpg://companion_ci:companion_ci_password@127.0.0.1:5432/companion_ci
        run: |
          python - <<'PY'
          import asyncio
          import os

          from alembic import command
          from alembic.config import Config
          from sqlalchemy import text
          from sqlalchemy.ext.asyncio import create_async_engine

          expected_head = "c1d2e3f4a5b6"
          seeded_user_id = "11111111-1111-4111-8111-111111111111"
          seeded_memory_id = "22222222-2222-4222-8222-222222222222"
          seeded_embedding_id = "33333333-3333-4333-8333-333333333333"
          seeded_embedding = "[" + ",".join(["0.125"] * 1536) + "]"
          database_url = os.environ["MIGRATION_DATABASE_URL"]
          config = Config("alembic.ini")
          config.set_main_option("sqlalchemy.url", database_url)

          async def seed_legacy_embedding() -> None:
              engine = create_async_engine(database_url)
              try:
                  async with engine.begin() as connection:
                      await connection.execute(text(
                          """
                          INSERT INTO users (id, username, password_hash)
                          VALUES (:id, 'legacy-vector-user', 'not-a-real-password-hash')
                          """
                      ), {"id": seeded_user_id})
                      await connection.execute(text(
                          """
                          INSERT INTO memories (
                              id, user_id, content, memory_type, importance_score
                          ) VALUES (
                              :id, :user_id, 'legacy vector fixture', 'preference', 0.5
                          )
                          """
                      ), {"id": seeded_memory_id, "user_id": seeded_user_id})
                      await connection.execute(text(
                          """
                          INSERT INTO memory_embeddings (id, memory_id, embedding, model)
                          VALUES (:id, :memory_id, :embedding, 'legacy-fixture')
                          """
                      ), {
                          "id": seeded_embedding_id,
                          "memory_id": seeded_memory_id,
                          "embedding": seeded_embedding,
                      })
              finally:
                  await engine.dispose()

          async def assert_head_schema(*, expect_seeded_embedding: bool) -> None:
              engine = create_async_engine(database_url)
              try:
                  async with engine.connect() as connection:
                      head = (await connection.execute(text(
                          "SELECT version_num FROM alembic_version"
                      ))).scalar_one()
                      extension_installed, embedding_type = (await connection.execute(text(
                          """
                          SELECT
                              EXISTS (SELECT 1 FROM pg_extension WHERE extname = 'vector'),
                              format_type(attribute.atttypid, attribute.atttypmod)
                          FROM pg_attribute AS attribute
                          WHERE attribute.attrelid = 'memory_embeddings'::regclass
                            AND attribute.attname = 'embedding'
                            AND NOT attribute.attisdropped
                          """
                      ))).one()
                      index_definition = (await connection.execute(text(
                          """
                          SELECT indexdef
                          FROM pg_indexes
                          WHERE schemaname = current_schema()
                            AND indexname = 'idx_memory_embeddings_vector'
                          """
                      ))).scalar_one()
                      preserved_embedding = (await connection.execute(text(
                          """
                          SELECT embedding::text
                          FROM memory_embeddings
                          WHERE id = :id
                          """
                      ), {"id": seeded_embedding_id})).scalar_one_or_none()
                  assert head == expected_head
                  assert extension_installed is True
                  assert embedding_type == "vector(1536)"
                  assert "USING hnsw (embedding vector_cosine_ops)" in index_definition
                  if expect_seeded_embedding:
                      assert preserved_embedding == seeded_embedding
                  else:
                      assert preserved_embedding is None
              finally:
                  await engine.dispose()

          async def assert_b0_downgrade() -> None:
              engine = create_async_engine(database_url)
              try:
                  async with engine.connect() as connection:
                      indexes = set((await connection.execute(text(
                          """
                          SELECT indexname
                          FROM pg_indexes
                          WHERE schemaname = current_schema()
                            AND tablename = 'messages'
                          """
                      ))).scalars())
                      constraints = set((await connection.execute(text(
                          """
                          SELECT constraint_name
                          FROM information_schema.table_constraints
                          WHERE table_schema = current_schema()
                            AND table_name = 'messages'
                          """
                      ))).scalars())
                  assert "idx_messages_session" in indexes
                  assert "idx_messages_trace_id" not in indexes
                  assert "uq_messages_session_message_index" not in constraints
              finally:
                  await engine.dispose()

          async def assert_c1_downgrade_fidelity() -> None:
              engine = create_async_engine(database_url)
              try:
                  async with engine.connect() as connection:
                      revision = (await connection.execute(text(
                          "SELECT version_num FROM alembic_version"
                      ))).scalar_one()
                      embedding_type = (await connection.execute(text(
                          """
                          SELECT format_type(attribute.atttypid, attribute.atttypmod)
                          FROM pg_attribute AS attribute
                          WHERE attribute.attrelid = 'memory_embeddings'::regclass
                            AND attribute.attname = 'embedding'
                            AND NOT attribute.attisdropped
                          """
                      ))).scalar_one()
                      index_definition = (await connection.execute(text(
                          """
                          SELECT indexdef
                          FROM pg_indexes
                          WHERE schemaname = current_schema()
                            AND indexname = 'idx_memory_embeddings_vector'
                          """
                      ))).scalar_one()
                      preserved_embedding = (await connection.execute(text(
                          """
                          SELECT embedding::text
                          FROM memory_embeddings
                          WHERE id = :id
                          """
                      ), {"id": seeded_embedding_id})).scalar_one()
                  assert revision == "b0c1d2e3f4a5"
                  assert embedding_type == "vector(1536)"
                  assert "USING hnsw (embedding vector_cosine_ops)" in index_definition
                  assert preserved_embedding == seeded_embedding
              finally:
                  await engine.dispose()

          script_heads = config.get_main_option("script_location")
          assert script_heads == "app/db/migrations"
          command.upgrade(config, "392b03f56f9f")
          asyncio.run(seed_legacy_embedding())
          command.upgrade(config, "head")
          asyncio.run(assert_head_schema(expect_seeded_embedding=True))
          command.downgrade(config, "b0c1d2e3f4a5")
          asyncio.run(assert_c1_downgrade_fidelity())
          command.upgrade(config, "head")
          asyncio.run(assert_head_schema(expect_seeded_embedding=True))
          command.downgrade(config, "a9c0d1e2f3b4")
          asyncio.run(assert_b0_downgrade())
          command.upgrade(config, "head")
          asyncio.run(assert_head_schema(expect_seeded_embedding=True))
          command.downgrade(config, "base")
          command.upgrade(config, "head")
          asyncio.run(assert_head_schema(expect_seeded_embedding=False))
          PY
      - name: Full backend tests
        run: pytest -q
      - name: Device contract tests
        run: pytest -q tests/test_firmware_protocol_contract.py tests/test_device_identity.py

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Frontend tests
        run: npm test
      - name: Typecheck
        run: npm run typecheck
      - name: Production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: https://api.example.test
          NEXT_PUBLIC_WS_URL: wss://api.example.test
          NEXT_PUBLIC_AGENT_RUNTIME: pi
      - name: Production Compose Web contract
        working-directory: .
        run: |
          trap 'rm -f .env.production /tmp/companion-production-compose.json' EXIT
          cp .env.production.example .env.production
          printf '%s\n' \
            'NEXT_PUBLIC_API_URL=https://api.example.test' \
            'NEXT_PUBLIC_WS_URL=wss://api.example.test' \
            'NEXT_PUBLIC_AGENT_RUNTIME=pi' \
            >> .env.production
          docker compose --env-file .env.production \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.production.yml \
            config --format json > /tmp/companion-production-compose.json
          python - <<'PY'
          import json
          from pathlib import Path

          expected = {
              "NEXT_PUBLIC_API_URL": "https://api.example.test",
              "NEXT_PUBLIC_WS_URL": "wss://api.example.test",
              "NEXT_PUBLIC_AGENT_RUNTIME": "pi",
          }
          config = json.loads(
              Path("/tmp/companion-production-compose.json").read_text(encoding="utf-8")
          )
          web = config["services"]["web"]
          build_args = web["build"]["args"]
          runtime_environment = {
              key: web["environment"][key] for key in expected
          }
          assert build_args == expected
          assert runtime_environment == expected
          assert not web.get("ports")
          assert all(
              "localhost" not in value
              for value in (*build_args.values(), *runtime_environment.values())
          )
          PY
          docker compose --env-file .env.production \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.production.yml \
            build web

  operations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Evidence manifest dry run
        run: |
          python scripts/evidence_manifest.py \
            --environment ci \
            --account-role ci \
            --migration-heads c1d2e3f4a5b6 \
            --trace-ids trace-ci \
            --receipt-ids receipt-ci \
            --output /tmp/evidence-manifest.json
          grep -q pending_unconfigured /tmp/evidence-manifest.json
      - name: Backup restore dry run
        run: |
          python scripts/backup_restore_check.py \
            --mode dry-run \
            --environment ci \
            --database-url postgresql://ci/companion \
            --output /tmp/backup-restore.json
          grep -q dry_run_ready /tmp/backup-restore.json
